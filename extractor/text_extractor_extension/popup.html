<!DOCTYPE html>
<html>
<head>
    <link href="popup.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h1 class="title">TEXT EXTRACTOR</h1>
        
        <button id="extract-btn" class="extract-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Extract Text
        </button>

        <textarea id="extracted-text-box" placeholder="Extracted text will appear here..."></textarea>

        <div class="footer-actions">
            <button id="clear-btn" class="secondary-btn">Clear Text</button>
        </div>

        <div class="toggle-container">
            <span>Enable Extension</span>
            <label class="switch">
                <input type="checkbox" id="toggle-extension" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <div class="info">
            <p>Shortcut: Ctrl + Shift + X</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
